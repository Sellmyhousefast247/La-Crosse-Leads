name: La Crosse County scraper

on:
  schedule:
    # 07:00 UTC daily (≈ 2am CDT / 1am CST) - adjust if you want 7am CST
    - cron: "0 7 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "lacrosse-scraper"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
          PYTHONUNBUFFERED: "1"
        run: python scraper/fetch.py

      - name: Show output summary
        if: always()
        run: |
          echo "--- dashboard/records.json ---"
          if [ -f dashboard/records.json ]; then
            python -c "import json; d=json.load(open('dashboard/records.json')); print('total:', d.get('total'), 'with_address:', d.get('with_address'))"
          fi

      - name: Commit results
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json dashboard/ghl_export.csv data/ghl_export.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(scrape): update records $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dashboard artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
